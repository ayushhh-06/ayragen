version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    ports:
      - "3007:3007"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/ayragen
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=ayragen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
